<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="96" fill="#020617"/>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4f46e5" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#0e7490" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="flame" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
  </defs>
  <!-- Gas pump body -->
  <rect x="140" y="200" width="160" height="200" rx="16" fill="url(#flame)" opacity="0.95"/>
  <!-- Pump top -->
  <rect x="140" y="160" width="160" height="56" rx="12" fill="#34d399"/>
  <!-- Screen on pump -->
  <rect x="162" y="230" width="116" height="70" rx="8" fill="#020617" opacity="0.7"/>
  <!-- Gwei text on screen -->
  <text x="220" y="272" font-family="monospace" font-size="28" font-weight="bold"
        fill="#34d399" text-anchor="middle">GAS</text>
  <!-- Nozzle arm -->
  <rect x="300" y="170" width="72" height="16" rx="8" fill="#6366f1"/>
  <rect x="356" y="170" width="16" height="80" rx="8" fill="#6366f1"/>
  <!-- Base -->
  <rect x="120" y="400" width="200" height="20" rx="10" fill="#34d399" opacity="0.6"/>
</svg>
